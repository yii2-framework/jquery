<svg fill="none" viewBox="0 0 1200 380" width="100%" height="340" xmlns="http://www.w3.org/2000/svg">
    <foreignObject width="100%" height="100%">
        <div xmlns="http://www.w3.org/1999/xhtml">
            <style>
                .container {
                    display: grid;
                    grid-template-columns: 1fr 1fr;
                    gap: 20px;
                    padding: 20px;
                }
                .alert-box {
                    border-left: 4px solid #1f883d;
                    padding: 12px;
                    margin-bottom: 16px;
                    border-radius: 6px;
                    background: rgba(31, 136, 61, 0.1);
                    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
                    width: 100%;
                    box-sizing: border-box;
                }
                .alert-title {
                    margin: 0 0 8px 0;
                    font-weight: 600;
                }
                .alert-content {
                    margin: 0;
                    line-height: 1.5;
                }

                /* Light mode */
                @media (prefers-color-scheme: light) {
                    .alert-title { color: #000000; }
                    .alert-content { color: #333333; }
                    .alert-box { background: rgba(31, 136, 61, 0.1); }
                }

                /* Dark mode */
                @media (prefers-color-scheme: dark) {
                    .alert-title { color: #ffffff; }
                    .alert-content { color: #ffffff; }
                    .alert-box { background: rgba(31, 136, 61, 0.2); }
                }
            </style>
            <div class="container">
                <div class="alert-box">
                    <p class="alert-title"><strong>Asset Bundles</strong></p>
                    <p class="alert-content">JqueryAsset • ValidationAsset • ActiveFormAsset • PjaxAsset • MaskedInputAsset • GridViewAsset</p>
                </div>
                <div class="alert-box">
                    <p class="alert-title"><strong>Client Validation</strong></p>
                    <p class="alert-content">jQuery-backed scripts for all 13 built-in validators • BooleanValidator, CompareValidator, EmailValidator, and more</p>
                </div>
                <div class="alert-box">
                    <p class="alert-title"><strong>Fully Optional</strong></p>
                    <p class="alert-content">Clean opt-out via useJquery: false • No jQuery assets loaded when disabled • Core remains framework-agnostic</p>
                </div>
                <div class="alert-box">
                    <p class="alert-title"><strong>Strategy Pattern</strong></p>
                    <p class="alert-content">Pluggable via $clientScript on every validator and widget • Drop-in replacement or fully custom implementation</p>
                </div>
                <div class="alert-box">
                    <p class="alert-title"><strong>Widget Integration</strong></p>
                    <p class="alert-content">ActiveForm • GridView • CheckboxColumn • Pjax • MaskedInput • Captcha</p>
                </div>
                <div class="alert-box">
                    <p class="alert-title"><strong>Zero Config</strong></p>
                    <p class="alert-content">Register Bootstrap and set useJquery: true • Works out of the box with existing Yii2 applications</p>
                </div>
            </div>
        </div>
    </foreignObject>
</svg>
